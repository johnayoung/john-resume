name: Retry Pages deploy

# deploy-pages hard-caps its queue-wait at 10 min and cancels the queued
# deployment on expiry, so a backed-up Pages queue fails the deploy job.
# Immediate same-SHA retries read back the canceled deployment, but a
# delayed re-run creates a fresh one. Cap at 3 total attempts.

on:
  workflow_run:
    workflows: ["Deploy Hugo site to Pages"]
    types: [completed]

permissions:
  actions: write

jobs:
  rerun:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    steps:
      - name: Wait for canceled deployment to clear
        run: sleep 120

      - name: Re-run failed deploy job
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run rerun ${{ github.event.workflow_run.id }} --failed --repo ${{ github.repository }}
