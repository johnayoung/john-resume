name: Verify research index links

on:
  workflow_dispatch:
  schedule:
    # Weekly, Monday 07:19 UTC. Fails only if a source URL is DEAD (404/410/DNS).
    - cron: '19 7 * * 1'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Regenerate index from source of truth
        run: node scripts/research-index/build.mjs

      - name: Verify source links
        run: node scripts/research-index/verify.mjs
