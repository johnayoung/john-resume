baseURL = "https://jyoung.dev/"
languageCode = "en-us"
title = "John Young"

# Taxonomies are unused; pillar filtering is driven by the `pillar` frontmatter
# field and the [[params.pillars]] list below.
disableKinds = ["taxonomy", "term"]

enableRobotsTXT = true
# Lastmod from the last commit touching each file; feeds sitemap <lastmod> and
# article:modified_time. CI checks out with fetch-depth: 0 so this works there.
enableGitInfo = true

# Plain-text indexes for AI crawlers (llms.txt spec): llms.txt is the linked
# index, llms-full.txt carries full essay text. Rendered from layouts/index.*.txt.
[outputFormats]
  [outputFormats.llms]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true
  [outputFormats.llmsfull]
    mediaType = "text/plain"
    baseName = "llms-full"
    isPlainText = true

[outputs]
  home = ["html", "rss", "llms", "llmsfull"]

[markup]
  [markup.highlight]
    # Class-based output; ledger.css styles code two-tone (ink + muted comments)
    # to match the design system's code panel exactly.
    lineNos = false
    codeFences = true
    guessSyntax = false
    noClasses = false
    tabWidth = 2
  [markup.goldmark.renderer]
    unsafe = true

[params]
  description = "Research-backed essays on running AI coding agents in production — every claim traced to a primary source."
  tagline = "Essays on running AI coding agents in production"
  author = "John Young"
  ogImage = "/og/default.png"
  # Buttondown newsletter handle (Settings → Embedding → the username in the Form URL).
  # The subscribe form + footer capture render only when this is set.
  buttondownUser = "johnantoyoung"
  # Booking link for the /work-with-me CTA. Falls back to a mailto when empty.
  calendlyUrl = "https://calendar.app.google/96uXGZz2WFnvgUrv7"
  # Cloudflare Web Analytics beacon token (dashboard -> Analytics & Logs -> Web Analytics
  # -> add jyoung.dev -> copy the token out of the JS snippet). Privacy-first, no cookie
  # banner needed. The beacon renders only when this is set.
  cloudflareAnalyticsToken = "835621ce854e4c4c9482b9092b27f1f1"

# Pillar display names, in filter-row order. Slugs match the `pillar` frontmatter
# field on posts. Labels are versioned metadata — rename here, slugs stay stable.
# "Agent Runtime" is the umbrella for context/harness/loop engineering (distinct
# sub-topics, not successive names — reframed 2026-07-13).
[[params.pillars]]
  slug = "task-design"
  name = "Task Design"
[[params.pillars]]
  slug = "context-engineering"
  name = "Agent Runtime"
[[params.pillars]]
  slug = "evals-verification"
  name = "Evals & Verification"
[[params.pillars]]
  slug = "production-operations"
  name = "Production Operations"
[[params.pillars]]
  slug = "team-process"
  name = "Team & Process"
[[params.pillars]]
  slug = "architecture-decisions"
  name = "Architecture Decisions"

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5
