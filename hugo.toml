baseURL = "https://jyoung.dev/"
languageCode = "en-us"
title = "John Young"

# Homepage is served from static/index.html (the existing single-page site).
# Disable Hugo's home, taxonomy, and sitemap generation so they don't collide
# with or pollute the static homepage. Section RSS at /blog/index.xml still works.
disableKinds = ["home", "taxonomy", "term"]

enableRobotsTXT = true

# Blog-pipeline artifacts live under content/blog/ (so the slash-command tools can
# read/write them next to each post) but are NOT content. Exclude them from the
# build so they don't render as stray blog entries. _index.md is intentionally
# not matched (it is the /blog/ list page).
ignoreFiles = ['/_research/', '/_outlines/', '/_polish/', '/_atomizations/', '/_ideas\.md$']

[markup]
  [markup.highlight]
    style = "catppuccin-mocha"
    lineNos = false
    codeFences = true
    guessSyntax = false
    noClasses = true
    tabWidth = 2
  [markup.goldmark.renderer]
    unsafe = true

[params]
  description = "Notes from John Young — engineering, AI systems, and DeFi infrastructure."
  author = "John Young"
  ogImage = "/img/headshot_new.png"

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5
