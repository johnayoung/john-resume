baseURL = "https://jyoung.dev/"
languageCode = "en-us"
title = "John Young"

# Homepage is served from static/index.html (the existing single-page site).
# Disable Hugo's home, taxonomy, and sitemap generation so they don't collide
# with or pollute the static homepage. Section RSS at /blog/index.xml still works.
disableKinds = ["home", "taxonomy", "term"]

enableRobotsTXT = true

[markup]
  [markup.highlight]
    style = "catppuccin-mocha"
    lineNos = false
    codeFences = true
    guessSyntax = false
    noClasses = true
    tabWidth = 2
  [markup.goldmark.renderer]
    unsafe = true

[params]
  description = "Notes from John Young — engineering, AI systems, and DeFi infrastructure."
  author = "John Young"
  ogImage = "/img/headshot_new.png"
  # Buttondown newsletter handle (Settings → Embedding → the username in the Form URL).
  # The subscribe form + footer capture render only when this is set.
  buttondownUser = "johnantoyoung"
  # Booking link for the /work-with-me CTA. Falls back to a mailto when empty.
  calendlyUrl = "https://calendar.app.google/96uXGZz2WFnvgUrv7"
  # Cloudflare Web Analytics beacon token (dashboard -> Analytics & Logs -> Web Analytics
  # -> add jyoung.dev -> copy the token out of the JS snippet). Privacy-first, no cookie
  # banner needed. The beacon renders only when this is set.
  cloudflareAnalyticsToken = "835621ce854e4c4c9482b9092b27f1f1"

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5
