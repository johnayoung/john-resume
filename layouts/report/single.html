{{ define "main" }}
<article class="page report">
  <header class="page__header report__header">
    {{ with .Params.kicker }}<p class="report__kicker mono-label">{{ . }}</p>{{ end }}
    <h1 class="page__title">{{ .Title }}</h1>
    {{ with .Description }}<p class="page__lede">{{ . }}</p>{{ end }}
    {{ with .Params.meta }}<p class="report__meta">{{ . | markdownify }}</p>{{ end }}
  </header>

  <div class="page__content report__content">
    {{ .Content }}
  </div>
</article>
{{ end }}
